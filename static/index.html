<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowList</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-top-spacer"></div>
      <nav id="gtd-nav"></nav>
      <div class="sidebar-separator"></div>
      <div class="sidebar-section">
        <div class="section-header">
          <span>PROJECTS</span>
          <button class="section-add-btn" onclick="promptCreate('project')">+</button>
        </div>
        <div id="projects-list"></div>
      </div>
      <div class="sidebar-separator"></div>
      <div class="sidebar-section">
        <div class="section-header">
          <span>AREAS</span>
          <button class="section-add-btn" onclick="promptCreate('area')">+</button>
        </div>
        <div id="areas-list"></div>
      </div>
    </aside>

    <!-- Main content -->
    <main id="main">
      <!-- Search overlay -->
      <div id="search-overlay" class="hidden">
        <div class="search-bar">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="search-input" type="text" placeholder="Search tasks..." autocomplete="off">
          <kbd class="esc-badge">ESC</kbd>
        </div>
        <div id="search-results"></div>
      </div>

      <!-- Task list area -->
      <div id="task-list-area">
        <header id="list-header">
          <h1 id="view-title">Inbox</h1>
          <span id="view-count" class="hidden"></span>
        </header>
        <div id="new-task-bar">
          <input id="new-task-input" type="text" placeholder="+ New To-Do" autocomplete="off">
        </div>
        <div id="task-list"></div>
        <div id="empty-state" class="hidden">
          <div class="empty-icon"></div>
          <div class="empty-title"></div>
          <div class="empty-subtitle"></div>
        </div>
      </div>
    </main>

    <!-- Detail panel -->
    <aside id="detail-panel" class="hidden">
      <div class="detail-top">
        <span id="detail-schedule-badge"></span>
        <button class="detail-close-btn" onclick="closeDetail()">&times;</button>
      </div>
      <div class="detail-body">
        <input id="detail-title" type="text" placeholder="Task title">

        <div class="detail-card">
          <label class="detail-label">Notes</label>
          <textarea id="detail-notes" placeholder="Add notes..." rows="4"></textarea>
        </div>

        <div class="detail-card">
          <label class="detail-label">When</label>
          <select id="detail-schedule">
            <option value="inbox">Inbox</option>
            <option value="today">Today</option>
            <option value="upcoming">Upcoming</option>
            <option value="anytime">Anytime</option>
            <option value="someday">Someday</option>
          </select>

          <label class="detail-label" style="margin-top:10px">Due Date</label>
          <input id="detail-due-date" type="date">
        </div>

        <div class="detail-card">
          <div class="detail-card-header">
            <label class="detail-label">Checklist</label>
            <span id="checklist-progress"></span>
            <button class="link-btn" onclick="addChecklistItem()">+ Add</button>
          </div>
          <div id="checklist-items"></div>
        </div>

        <button class="danger-btn" onclick="deleteCurrentTask()">Delete Task</button>
      </div>
    </aside>

    <!-- Quick Entry Modal -->
    <div id="quick-entry-backdrop" class="hidden" onclick="closeQuickEntry()">
      <div id="quick-entry" onclick="event.stopPropagation()">
        <div class="qe-header">Quick Entry</div>
        <input id="qe-title" type="text" placeholder="What's on your mind?" autocomplete="off">
        <div id="qe-pills"></div>
        <div class="qe-actions">
          <button class="ghost-btn" onclick="closeQuickEntry()">Cancel</button>
          <button class="accent-btn" onclick="submitQuickEntry()">Add Task</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
